name: Publish Package to npmjs
on:
  release:
    types: [released]

permissions:
  contents: read
  id-token: write


jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: "24.x"
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm
      - run: npm ci
      - name: Lint
        run: npm run check
      - name: Build
        run: npm run build
      - name: Test
        run: npm run test
      - run: npm publish --provenance --access public
